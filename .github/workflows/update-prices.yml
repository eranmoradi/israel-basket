name: Daily Price Update

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 04:00-05:00 Israel time
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch chain prices
        run: python3 -u scripts/fetch_chain_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add israel-basket/src/data/chain_prices.json
          git diff --cached --quiet || git commit -m "chore: update chain prices [$(date -u '+%Y-%m-%d')]"
          git push
